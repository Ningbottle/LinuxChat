<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BottleChat - 瓶子交流器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F0F5;
  --sidebar:#E8E8ED;
  --sidebar-hover:#DDDEE5;
  --sidebar-active:#D2D3DA;
  --card:#FFFFFF;
  --text:#1A1A2E;
  --text2:#5A5A72;
  --text3:#9292A8;
  --border:#D8D8E0;
  --accent:#5865F2;
  --accent2:#4752C4;
  --green:#23A559;
  --yellow:#F0B232;
  --red:#ED4245;
  --orange:#E8853A;
  --self-bg:#DDE3FF;
  --system-bg:#E2E2EA;
  --input-bg:#FFFFFF;
  --shadow:0 1px 3px rgba(0,0,0,.08);
  --shadow2:0 4px 12px rgba(0,0,0,.12);
}
.scheme-b{
  --bg:#EDF0F7;
  --sidebar:#E2E6EF;
  --sidebar-hover:#D8DCE7;
  --sidebar-active:#CDD1DE;
  --card:#FFFFFF;
  --text:#1A1E2E;
  --text2:#565C72;
  --text3:#8C92A8;
  --border:#D0D4E0;
  --self-bg:#D4DCF8;
  --system-bg:#DDE1EC;
  --input-bg:#FFFFFF;
}
html,body{
  height:100%;
  font-family:'LXGW WenKai','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
  font-size:14px;
  line-height:1.5;
}

/* scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#B0B0C0;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#9090A8}

/* ===== LOGIN ===== */
#login-overlay{
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  transition:opacity .6s,visibility .6s;
}
#login-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
.login-card{
  width:380px;
  background:rgba(255,255,255,.65);
  backdrop-filter:blur(24px) saturate(1.4);
  -webkit-backdrop-filter:blur(24px) saturate(1.4);
  border:1px solid rgba(255,255,255,.5);
  border-radius:16px;
  padding:40px 32px 32px;
  box-shadow:var(--shadow2);
  text-align:center;
}
.login-card h1{font-size:24px;font-weight:700;margin-bottom:4px;color:var(--text)}
.login-card .subtitle{font-size:13px;color:var(--text3);margin-bottom:28px}
.login-card .logo{font-size:42px;margin-bottom:12px}
.login-card input{
  width:100%;padding:10px 14px;border:1px solid var(--border);
  border-radius:8px;font-size:14px;font-family:inherit;
  background:rgba(255,255,255,.7);color:var(--text);
  outline:none;transition:border .2s;
}
.login-card input:focus{border-color:var(--accent)}
.login-card input+input{margin-top:10px}
.login-card button{
  width:100%;margin-top:18px;padding:11px;
  background:var(--accent);color:#fff;border:none;
  border-radius:8px;font-size:15px;font-weight:700;
  font-family:inherit;cursor:pointer;
  transition:background .2s,transform .1s;
}
.login-card button:hover{background:var(--accent2)}
.login-card button:active{transform:scale(.98)}

/* ===== APP LAYOUT ===== */
#app{
  display:flex;height:100vh;width:100vw;
  opacity:0;transition:opacity .5s;
}
#app.visible{opacity:1}

/* ===== SIDEBAR ===== */
#sidebar{
  width:280px;min-width:200px;max-width:500px;
  background:var(--sidebar);
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);
  position:relative;flex-shrink:0;
  transition:width .3s;
}
#sidebar.collapsed{width:0!important;min-width:0;overflow:hidden;border-right:none}
#sidebar.collapsed+#resizer{display:none}

#sidebar-header{
  padding:12px 14px 8px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
#sidebar-header h2{font-size:15px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-btn{
  width:28px;height:28px;border:none;background:transparent;
  border-radius:6px;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:background .15s;
}
.header-btn:hover{background:var(--sidebar-hover)}

/* search */
#search-box{
  padding:6px 14px;flex-shrink:0;
}
#search-box input{
  width:100%;padding:7px 10px 7px 30px;
  border:none;border-radius:6px;font-size:13px;
  font-family:inherit;background:var(--card);
  color:var(--text);outline:none;
}
#search-box{position:relative}
#search-box::before{
  content:'\1F50D';position:absolute;left:22px;top:50%;
  transform:translateY(-50%);font-size:12px;pointer-events:none;
}

/* conversations */
#conv-list{
  flex:1;overflow-y:auto;padding:4px 6px;
}
.conv-item{
  display:flex;align-items:center;gap:10px;
  padding:6px 8px;border-radius:8px;cursor:pointer;
  transition:background .12s;height:48px;flex-shrink:0;
  position:relative;
}
.conv-item:hover{background:var(--sidebar-hover)}
.conv-item.active{background:var(--sidebar-active)}

/* avatar */
.avatar-wrap{position:relative;flex-shrink:0}
.avatar{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#fff;
  flex-shrink:0;
}
.online-dot{
  position:absolute;bottom:0;right:0;
  width:10px;height:10px;border-radius:50%;
  border:2px solid var(--sidebar);
}
.online-dot.online{background:var(--green);animation:pulse-dot 2s infinite}
.online-dot.away{background:var(--yellow)}
.online-dot.offline{background:#999}
@keyframes pulse-dot{
  0%,100%{box-shadow:0 0 0 0 rgba(35,165,89,.4)}
  50%{box-shadow:0 0 0 4px rgba(35,165,89,0)}
}

.conv-info{flex:1;min-width:0}
.conv-top{display:flex;align-items:baseline;gap:4px}
.conv-name{font-size:13px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-time{font-size:11px;color:var(--text3);flex-shrink:0}
.conv-preview{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

.conv-pin{color:var(--accent);font-size:10px;margin-left:2px}

.unread-badge{
  min-width:18px;height:18px;border-radius:9px;
  background:var(--red);color:#fff;font-size:11px;
  font-weight:700;display:flex;align-items:center;
  justify-content:center;padding:0 5px;flex-shrink:0;
  animation:badge-pop .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes badge-pop{0%{transform:scale(0)}100%{transform:scale(1)}}

/* user card at bottom */
#user-card{
  padding:10px 14px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  background:var(--sidebar);
}
#user-card .avatar{width:32px;height:32px;font-size:13px}
#user-card .user-info{flex:1;min-width:0}
#user-card .user-name{font-size:13px;font-weight:700}
#user-card .user-status{font-size:11px;color:var(--text3)}
#user-card .status-dot{
  display:inline-block;width:7px;height:7px;
  border-radius:50%;margin-right:4px;vertical-align:middle;
}

/* ===== RESIZER ===== */
#resizer{
  width:5px;cursor:col-resize;flex-shrink:0;
  background:transparent;position:relative;z-index:10;
  transition:background .15s;
}
#resizer:hover,#resizer.active{background:var(--accent)}

/* ===== CHAT AREA ===== */
#chat-area{
  flex:1;display:flex;flex-direction:column;min-width:0;
  background:var(--bg);
}

/* chat header */
#chat-header{
  height:52px;padding:0 16px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
  background:var(--card);flex-shrink:0;
  box-shadow:var(--shadow);
}
#chat-header .ch-name{font-size:15px;font-weight:700}
#chat-header .ch-status{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px}
#chat-header .ch-status .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
#chat-header .ch-right{margin-left:auto;display:flex;align-items:center;gap:6px}
#chat-header .member-count{
  font-size:12px;color:var(--text3);
  display:flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:12px;
  background:var(--bg);
}
#chat-header .member-count .dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}

/* sidebar toggle inside chat header */
#toggle-sidebar-btn{
  width:30px;height:30px;border:none;background:transparent;
  border-radius:6px;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:background .15s;
}
#toggle-sidebar-btn:hover{background:var(--bg)}

/* scheme toggle */
#scheme-toggle{
  width:30px;height:30px;border:none;background:var(--bg);
  border-radius:6px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:background .15s;
}
#scheme-toggle:hover{background:var(--border)}

/* messages */
#messages{
  flex:1;overflow-y:auto;padding:12px 16px;
  display:flex;flex-direction:column;gap:2px;
}
.msg-row{
  display:flex;gap:10px;padding:4px 8px;
  border-radius:8px;transition:background .1s;
  animation:msg-in .3s cubic-bezier(.2,.7,.4,1);
}
.msg-row:hover{background:rgba(0,0,0,.03)}
@keyframes msg-in{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.msg-row.self{flex-direction:row-reverse}
.msg-row .msg-avatar{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;flex-shrink:0;
}
.msg-row .msg-body{min-width:0;max-width:70%}
.msg-row .msg-head{
  display:flex;align-items:baseline;gap:6px;
  margin-bottom:2px;
}
.msg-row.self .msg-head{flex-direction:row-reverse}
.msg-row .msg-sender{font-size:13px;font-weight:700}
.msg-row .msg-time{font-size:11px;color:var(--text3)}
.msg-row .msg-read{font-size:11px;color:var(--accent)}
.msg-row .msg-text{
  font-size:14px;line-height:1.55;
  padding:8px 12px;border-radius:10px;
  background:var(--card);word-break:break-word;
  box-shadow:var(--shadow);
}
.msg-row.self .msg-text{
  background:var(--self-bg);
}
.msg-row.self .msg-body{display:flex;flex-direction:column;align-items:flex-end}

/* system message */
.msg-system{
  text-align:center;padding:4px 0;
  animation:msg-in .3s;
}
.msg-system span{
  display:inline-block;padding:4px 16px;
  background:var(--system-bg);border-radius:12px;
  font-size:12px;color:var(--text3);
}

/* typing indicator */
#typing{
  padding:4px 20px;font-size:12px;color:var(--text3);
  height:24px;display:flex;align-items:center;gap:6px;
  flex-shrink:0;
}
.typing-dots{display:flex;gap:3px}
.typing-dots span{
  width:5px;height:5px;border-radius:50%;
  background:var(--text3);animation:typing-bounce 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes typing-bounce{
  0%,60%,100%{transform:translateY(0)}
  30%{transform:translateY(-4px)}
}

/* input area */
#input-area{
  padding:10px 16px 14px;flex-shrink:0;
  border-top:1px solid var(--border);
  background:var(--card);
}
.input-container{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--bg);border-radius:12px;
  padding:6px 6px 6px 14px;
  border:1px solid var(--border);
  transition:border .2s;
}
.input-container:focus-within{border-color:var(--accent)}
#msg-input{
  flex:1;border:none;background:transparent;
  font-size:14px;font-family:inherit;color:var(--text);
  resize:none;outline:none;min-height:22px;
  max-height:120px;line-height:1.5;
}
#msg-input::placeholder{color:var(--text3)}
.input-btn{
  width:32px;height:32px;border:none;
  border-radius:8px;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
}
.emoji-btn{background:transparent;color:var(--text3)}
.emoji-btn:hover{background:var(--sidebar-hover)}
.send-btn{background:var(--accent);color:#fff}
.send-btn:hover{background:var(--accent2)}
.send-btn:active{transform:scale(.9)}

/* send spring anim */
@keyframes send-spring{
  0%{transform:scale(1)}
  40%{transform:scale(.85)}
  70%{transform:scale(1.1)}
  100%{transform:scale(1)}
}
.send-spring{animation:send-spring .35s cubic-bezier(.34,1.56,.64,1)}

/* ===== RESPONSIVE ===== */
@media(max-width:700px){
  #sidebar{position:absolute;z-index:50;height:100%;left:0;top:0}
  #sidebar.collapsed{width:0}
}
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="login-overlay">
  <div class="login-card">
    <div class="logo">🍶</div>
    <h1>BottleChat</h1>
    <p class="subtitle">瓶子交流器 — 连接每一颗心灵</p>
    <input type="text" id="login-name" placeholder="输入你的昵称" value="我">
    <input type="text" id="login-server" placeholder="服务器地址（可选）" value="wss://chat.bottle.local">
    <button id="connect-btn" onclick="doLogin()">连接服务器</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>🍶 BottleChat</h2>
      <button class="header-btn" title="折叠侧栏" onclick="toggleSidebar()">◀</button>
    </div>
    <div id="search-box">
      <input type="text" placeholder="搜索会话..." id="search-input" oninput="filterConvs(this.value)">
    </div>
    <div id="conv-list"></div>
    <div id="user-card">
      <div class="avatar-wrap">
        <div class="avatar" style="background:#5865F2">我</div>
        <div class="online-dot online"></div>
      </div>
      <div class="user-info">
        <div class="user-name" id="my-name">我</div>
        <div class="user-status"><span class="status-dot" style="background:var(--green)"></span>在线</div>
      </div>
      <button class="header-btn" title="设置" style="font-size:14px">⚙</button>
    </div>
  </div>

  <!-- RESIZER -->
  <div id="resizer"></div>

  <!-- CHAT AREA -->
  <div id="chat-area">
    <div id="chat-header">
      <button id="toggle-sidebar-btn" onclick="toggleSidebar()" title="展开侧栏">▶</button>
      <div>
        <div class="ch-name" id="ch-name">公共聊天室</div>
        <div class="ch-status" id="ch-status">
          <span class="dot" style="background:var(--green)"></span> 在线
        </div>
      </div>
      <div class="ch-right">
        <div class="member-count" id="member-count"><span class="dot"></span> <span>8 人在线</span></div>
        <button id="scheme-toggle" onclick="toggleScheme()" title="切换配色">🎨</button>
      </div>
    </div>
    <div id="messages"></div>
    <div id="typing">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span id="typing-text">陈晓雨 正在输入...</span>
    </div>
    <div id="input-area">
      <div class="input-container">
        <textarea id="msg-input" placeholder="输入消息... (Enter 发送)" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="input-btn emoji-btn" title="表情">😊</button>
        <button class="input-btn send-btn" onclick="sendMsg()" title="发送">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
// ===== DATA =====
const USERS = {
  '我':      { color:'#5865F2', bg:'#5865F2', status:'online' },
  '陈晓雨':  { color:'#23A559', bg:'#23A559', status:'online' },
  '张伟':    { color:'#E8853A', bg:'#E8853A', status:'offline' },
  '李梦琪':  { color:'#EB459E', bg:'#EB459E', status:'online' },
  '王浩然':  { color:'#F0B232', bg:'#F0B232', status:'away' },
  '刘思远':  { color:'#5865F2', bg:'#57F287', status:'online' },
  '赵小明':  { color:'#ED4245', bg:'#ED4245', status:'offline' },
  '周天宇':  { color:'#9B59B6', bg:'#9B59B6', status:'away' },

const CONVS = [

      { from:'李梦琪', text:'今天下午开会吗？', time:'12:45' },

  { id:'chenxy', name:'陈晓雨', type:'dm', pinned:false, status:'online', unread:1, members:0,
    preview:'你看到新部署的文档了吗？', time:'12:38',
    messages:[
      { sys:true, text:'— 上午 11:00 —' },
      { from:'陈晓雨', text:'在吗？有个问题想请教你。', time:'11:20' },
      { from:'我',     text:'在的，什么问题？', time:'11:22', read:true },

      { from:'陈晓雨', text:'你看到新部署的文档了吗？', time:'12:38' },

  { id:'zhangw', name:'张伟', type:'dm', pinned:false, status:'offline', unread:0, members:0,

    messages:[
      { from:'张伟', text:'周末有空一起打球吗？', time:'昨天 18:30' },

      { from:'张伟', text:'下午两点，老地方。', time:'昨天 19:00' },

    messages:[
      { from:'李梦琪', text:'Hi，设计稿初版出来了。', time:'10:00' },
      { from:'我',     text:'收到，我看一下。', time:'10:15', read:true },
      { from:'李梦琪', text:'主要改了三个地方：导航栏、消息列表、输入框。', time:'10:20' },
      { from:'我',     text:'导航栏的间距感觉可以再大一点。', time:'10:30', read:true },
      { from:'李梦琪', text:'好的，我调整一下。', time:'10:35' },
      { from:'李梦琪', text:'设计稿已更新 ✅', time:'11:55' },

  },

let activeConv = CONVS[0];
let sidebarCollapsed = false;
let scheme = 'A';

// ===== RENDER CONVERSATIONS =====
function renderConvs(filter) {
  const list = document.getElementById('conv-list');
  list.innerHTML = '';
  const filtered = filter
    ? CONVS.filter(c => c.name.includes(filter) || c.preview.includes(filter))
    : CONVS;
  // pinned first
  const sorted = [...filtered].sort((a,b) => (b.pinned?1:0) - (a.pinned?1:0));
  sorted.forEach(c => {
    const el = document.createElement('div');
    el.className = 'conv-item' + (c.id === activeConv.id ? ' active' : '');
    el.onclick = () => selectConv(c);

    const u = c.type === 'dm' ? USERS[c.name] : null;
    const st = u ? u.status : 'online';
    const initial = c.name[0];
    const avColor = u ? u.bg : '#5865F2';

    let badgeHTML = c.unread > 0 ? `<div class="unread-badge">${c.unread}</div>` : '';
    let pinHTML = c.pinned ? '<span class="conv-pin">📌</span>' : '';
    let statusText = st === 'online' ? '在线' : st === 'away' ? '离开' : '离线';

    el.innerHTML = `
      <div class="avatar-wrap">
        <div class="avatar" style="background:${avColor}">${initial}</div>
        <div class="online-dot ${st}"></div>
      </div>
      <div class="conv-info">
        <div class="conv-top">
          <span class="conv-name">${c.name}${pinHTML}</span>
          <span class="conv-time">${c.time}</span>
        </div>
        <div class="conv-preview">${c.preview}</div>
      </div>
      ${badgeHTML}
    `;
    list.appendChild(el);
  });
}

function filterConvs(v) { renderConvs(v); }

// ===== SELECT CONVERSATION =====
function selectConv(c) {
  activeConv = c;
  c.unread = 0;
  renderConvs(document.getElementById('search-input').value);
  renderChat();
  updateHeader();
}

// ===== RENDER CHAT =====
function renderChat() {
  const box = document.getElementById('messages');
  box.innerHTML = '';
  const myName = document.getElementById('my-name').textContent;

  activeConv.messages.forEach((m, i) => {
    if (m.sys) {
      const d = document.createElement('div');
      d.className = 'msg-system';
      d.innerHTML = `<span>${m.text}</span>`;
      box.appendChild(d);
      return;
    }
    const isSelf = m.from === myName;
    const u = USERS[m.from] || { color:'#888', bg:'#888' };
    const row = document.createElement('div');
    row.className = 'msg-row' + (isSelf ? ' self' : '');

    // read receipt
    let readHTML = '';
    if (isSelf) {
      if (m.read) readHTML = '<span class="msg-read">✓✓ 已读</span>';
      else readHTML = '<span class="msg-time" style="color:var(--text3)">✓ 已发送</span>';
    }

    row.innerHTML = `
      <div class="avatar-wrap">
        <div class="msg-avatar" style="background:${u.bg}">${m.from[0]}</div>
      </div>
      <div class="msg-body">
        <div class="msg-head">
          <span class="msg-sender" style="color:${u.color}">${m.from}</span>
          <span class="msg-time">${m.time}</span>
          ${readHTML}
        </div>
        <div class="msg-text">${m.text}</div>
      </div>
    `;
    row.style.animationDelay = (i * 0.03) + 's';
    box.appendChild(row);
  });

  // scroll to bottom
  requestAnimationFrame(() => { box.scrollTop = box.scrollHeight; });
}

function updateHeader() {
  const c = activeConv;
  document.getElementById('ch-name').textContent = c.name;
  if (c.type === 'group') {
    document.getElementById('ch-status').innerHTML = '<span class="dot" style="background:var(--green)"></span> 公开频道';
    document.getElementById('member-count').style.display = '';
    document.getElementById('member-count').querySelector('span:last-child').textContent = c.members + ' 人在线';
  } else {
    const u = USERS[c.name];
    const st = u ? u.status : 'offline';
    const stLabel = st === 'online' ? '在线' : st === 'away' ? '离开' : '离线';
    const stColor = st === 'online' ? 'var(--green)' : st === 'away' ? 'var(--yellow)' : '#999';
    document.getElementById('ch-status').innerHTML = `<span class="dot" style="background:${stColor}"></span> ${stLabel}`;
    document.getElementById('member-count').style.display = 'none';
  }
}

// ===== SEND MESSAGE =====
function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  const myName = document.getElementById('my-name').textContent;
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  activeConv.messages.push({ from: myName, text, time, read: false });
  activeConv.preview = text;
  activeConv.time = time;
  input.value = '';
  input.style.height = 'auto';
  renderChat();
  renderConvs(document.getElementById('search-input').value);

  // spring animation on send btn
  const btn = document.querySelector('.send-btn');
  btn.classList.remove('send-spring');
  void btn.offsetWidth;
  btn.classList.add('send-spring');

  // simulate read receipt
  setTimeout(() => {
    const msgs = activeConv.messages;
    for (let i = msgs.length - 1; i >= 0; i--) {
      if (msgs[i].from === myName && !msgs[i].read) {
        msgs[i].read = true;
        renderChat();
        break;
      }
    }
  }, 2000);

  // simulate reply
  if (activeConv.type === 'dm') {
    setTimeout(() => {
      const u = USERS[activeConv.name];
      if (u && u.status === 'online') {
        const replies = ['收到 👍','好的，明白了！','嗯嗯','我在看了','稍等一下','没问题','了解','马上处理'];
        const rt = new Date();
        const rtime = rt.getHours().toString().padStart(2,'0') + ':' + rt.getMinutes().toString().padStart(2,'0');
        activeConv.messages.push({ from: activeConv.name, text: replies[Math.floor(Math.random()*replies.length)], time: rtime });
        activeConv.preview = activeConv.messages[activeConv.messages.length-1].text;
        activeConv.time = rtime;
        renderChat();
        renderConvs(document.getElementById('search-input').value);
      }
    }, 1500 + Math.random() * 2000);
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ===== SIDEBAR TOGGLE =====
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  sidebarCollapsed = !sidebarCollapsed;
  sb.classList.toggle('collapsed', sidebarCollapsed);
  document.getElementById('toggle-sidebar-btn').textContent = sidebarCollapsed ? '▶' : '◀';
  document.querySelector('#sidebar-header .header-btn').textContent = sidebarCollapsed ? '▶' : '◀';
}

// ===== RESIZER =====
(function() {
  const resizer = document.getElementById('resizer');
  const sidebar = document.getElementById('sidebar');
  let startX, startW;
  resizer.addEventListener('mousedown', (e) => {
    e.preventDefault();
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    resizer.classList.add('active');
    const onMove = (ev) => {
      let w = startW + (ev.clientX - startX);
      w = Math.max(200, Math.min(500, w));
      sidebar.style.width = w + 'px';
    };
    const onUp = () => {
      resizer.classList.remove('active');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

// ===== SCHEME TOGGLE =====
function toggleScheme() {
  scheme = scheme === 'A' ? 'B' : 'A';
  document.body.classList.toggle('scheme-b', scheme === 'B');
  document.getElementById('scheme-toggle').textContent = scheme === 'A' ? '🎨' : '🖌';
}

// ===== LOGIN =====
function doLogin() {
  const name = document.getElementById('login-name').value.trim() || '匿名用户';
  document.getElementById('my-name').textContent = name;
  document.querySelector('#user-card .avatar').textContent = name[0];
  document.querySelector('#user-card .avatar').style.background = USERS['我'].bg;
  USERS[name] = USERS['我'];
  delete USERS['我'];
  // Update messages
  CONVS.forEach(c => {
    c.messages.forEach(m => {
      if (m.from === '我') m.from = name;
    });
  });

  document.getElementById('login-overlay').classList.add('hidden');
  document.getElementById('app').classList.add('visible');

  renderConvs();
  renderChat();
  updateHeader();
}

// ===== INIT =====
renderConvs();
renderChat();
updateHeader();
</script>
