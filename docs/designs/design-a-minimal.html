<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BottleChat / 瓶子交流器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #FFFFFF;
  --bg-secondary: #FAFAFA;
  --bg-tertiary: #F5F5F5;
  --border: #E5E5EA;
  --text-primary: #1A1A1A;
  --text-secondary: #8E8E93;
  --text-tertiary: #AEAEB2;
  --accent: #8E8E93;
  --accent-subtle: #F2F2F7;
  --msg-self-bg: #F0F0F0;
  --msg-other-bg: transparent;
  --system-bg: transparent;
  --login-overlay: rgba(255, 255, 255, 0.72);
  --font: 'LXGW WenKai', serif;
  --sidebar-w: 260px;
}

[data-theme="warm"] {
  --bg: #FAF8F5;
  --bg-secondary: #F5F2EE;
  --bg-tertiary: #EFEBE6;
  --border: #E8E4DF;
  --text-primary: #1C1917;
  --text-secondary: #8C837A;
  --text-tertiary: #B8AFA6;
  --accent: #8C837A;
  --accent-subtle: #F0ECE7;
  --msg-self-bg: #EEEAE4;
  --msg-other-bg: transparent;
  --system-bg: transparent;
  --login-overlay: rgba(250, 248, 245, 0.72);
}

html, body {
  height: 100%;
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.65;
  color: var(--text-primary);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

/* ── Login Screen ── */
#login-screen {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-secondary);
  transition: opacity 200ms ease;
}

#login-screen.fade-out {
  opacity: 0;
  pointer-events: none;
}

.login-card {
  width: 340px;
  padding: 48px 36px 40px;
  background: var(--login-overlay);
  -webkit-backdrop-filter: blur(40px) saturate(1.2);
  backdrop-filter: blur(40px) saturate(1.2);
  border: 1px solid var(--border);
  border-radius: 12px;
  text-align: center;
}

.login-card h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.login-card .subtitle {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 36px;
}

.login-card label {
  display: block;
  text-align: left;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.login-card input[type="text"],
.login-card input[type="password"] {
  width: 100%;
  padding: 10px 0;
  border: none;
  border-bottom: 1px solid var(--border);
  background: transparent;
  font-family: var(--font);
  font-size: 14px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 200ms;
  margin-bottom: 20px;
}

.login-card input:focus {
  border-bottom-color: var(--accent);
}

.login-card .btn-connect {
  width: 100%;
  margin-top: 12px;
  padding: 11px 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  font-family: var(--font);
  font-size: 14px;
  color: var(--text-primary);
  cursor: pointer;
  transition: background 200ms, border-color 200ms;
  letter-spacing: 0.04em;
}

.login-card .btn-connect:hover {
  background: var(--bg-tertiary);
  border-color: var(--text-tertiary);
}

.login-card .btn-connect:active {
  background: var(--accent-subtle);
}

/* ── App Shell ── */
#app {
  display: flex;
  height: 100vh;
  width: 100vw;
  opacity: 0;
  transition: opacity 200ms ease;
}

#app.visible {
  opacity: 1;
}

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w);
  min-width: 200px;
  max-width: 500px;
  height: 100%;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--bg);
  position: relative;
  flex-shrink: 0;
  transition: width 0ms, opacity 200ms;
  overflow: hidden;
}

#sidebar.collapsed {
  width: 0 !important;
  min-width: 0;
  border-right: none;
  opacity: 0;
  pointer-events: none;
}

/* Resize Handle */
#resize-handle {
  position: absolute;
  top: 0;
  right: -2px;
  width: 5px;
  height: 100%;
  cursor: col-resize;
  z-index: 10;
}

#resize-handle::after {
  content: '';
  position: absolute;
  top: 0;
  right: 2px;
  width: 1px;
  height: 100%;
  background: transparent;
  transition: background 200ms;
}

#resize-handle:hover::after,
#resize-handle.active::after {
  background: var(--text-tertiary);
}

/* Sidebar Header */
.sidebar-header {
  padding: 16px 16px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.sidebar-header .app-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.01em;
  white-space: nowrap;
}

.sidebar-header .btn-collapse {
  width: 28px;
  height: 28px;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: color 200ms, background 200ms;
  flex-shrink: 0;
}

.sidebar-header .btn-collapse:hover {
  color: var(--text-secondary);
  background: var(--accent-subtle);
}

/* Search */
.search-box {
  padding: 0 16px 12px;
  flex-shrink: 0;
}

.search-box input {
  width: 100%;
  padding: 8px 0;
  border: none;
  border-bottom: 1px solid var(--border);
  background: transparent;
  font-family: var(--font);
  font-size: 13px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 200ms;
}

.search-box input::placeholder {
  color: var(--text-tertiary);
}

.search-box input:focus {
  border-bottom-color: var(--accent);
}

/* Conversation List */
.conv-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px;
}

.conv-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 150ms;
  user-select: none;
}

.conv-item:hover {
  background: var(--accent-subtle);
}

.conv-item.active {
  background: var(--bg-tertiary);
}

.conv-item .avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
  letter-spacing: 0;
}

.conv-item .conv-info {
  flex: 1;
  min-width: 0;
}

.conv-item .conv-name {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  gap: 6px;
}

.conv-item .conv-name .pin-icon {
  font-size: 10px;
  color: var(--text-tertiary);
  flex-shrink: 0;
}

.conv-item .conv-preview {
  font-size: 12px;
  color: var(--text-tertiary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}

.conv-item .conv-time {
  font-size: 11px;
  color: var(--text-tertiary);
  flex-shrink: 0;
  align-self: flex-start;
  margin-top: 2px;
}

.conv-divider {
  padding: 10px 10px 4px;
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* User Card */
.user-card {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.user-card .avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}

.user-card .user-info {
  flex: 1;
  min-width: 0;
}

.user-card .user-name {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-primary);
}

.user-card .user-status {
  font-size: 11px;
  color: var(--text-tertiary);
}

.user-card .btn-theme {
  width: 28px;
  height: 28px;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: color 200ms, background 200ms;
  flex-shrink: 0;
}

.user-card .btn-theme:hover {
  color: var(--text-secondary);
  background: var(--accent-subtle);
}

/* ── Chat Area ── */
#chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  background: var(--bg);
  min-width: 0;
}

/* Chat Header */
.chat-header {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.chat-header .btn-expand {
  width: 28px;
  height: 28px;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  border-radius: 6px;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: color 200ms, background 200ms;
  flex-shrink: 0;
}

.sidebar.collapsed ~ #chat-area .btn-expand {
  display: flex;
}

.chat-header .btn-expand:hover {
  color: var(--text-secondary);
  background: var(--accent-subtle);
}

.chat-header .header-info {
  flex: 1;
  min-width: 0;
}

.chat-header .header-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
}

.chat-header .header-status {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: -1px;
}

.chat-header .btn-ellipsis {
  width: 28px;
  height: 28px;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  letter-spacing: 2px;
  transition: color 200ms, background 200ms;
  flex-shrink: 0;
}

.chat-header .btn-ellipsis:hover {
  color: var(--text-secondary);
  background: var(--accent-subtle);
}

/* Messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.msg-group {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-bottom: 14px;
}

.msg-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.msg-row.self {
  flex-direction: row-reverse;
}

.msg-row .msg-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
  align-self: flex-end;
}

.msg-bubble {
  max-width: 55%;
  position: relative;
}

.msg-sender {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-bottom: 3px;
  padding: 0 2px;
}

.msg-row.self .msg-sender {
  text-align: right;
}

.msg-text {
  padding: 10px 14px;
  border-radius: 4px;
  font-size: 14px;
  line-height: 1.65;
  word-break: break-word;
  color: var(--text-primary);
}

.msg-row:not(.self) .msg-text {
  background: var(--accent-subtle);
  border-top-left-radius: 2px;
}

.msg-row.self .msg-text {
  background: var(--msg-self-bg);
  border-top-right-radius: 2px;
}

.msg-time {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 4px;
  padding: 0 2px;
}

.msg-row.self .msg-time {
  text-align: right;
}

/* System Messages */
.msg-system {
  text-align: center;
  padding: 8px 0;
}

.msg-system span {
  font-size: 12px;
  color: var(--text-tertiary);
  letter-spacing: 0.02em;
}

/* Date divider */
.date-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 0;
}

.date-divider::before,
.date-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.date-divider span {
  font-size: 12px;
  color: var(--text-tertiary);
  white-space: nowrap;
}

/* New message animation */
.msg-enter {
  animation: msgFade 200ms ease forwards;
}

@keyframes msgFade {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Chat Input */
.chat-input {
  padding: 0 24px 20px;
  flex-shrink: 0;
}

.chat-input textarea {
  width: 100%;
  padding: 12px 0;
  border: none;
  border-bottom: 1px solid var(--border);
  background: transparent;
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.65;
  color: var(--text-primary);
  outline: none;
  resize: none;
  min-height: 24px;
  max-height: 120px;
  transition: border-color 200ms;
}

.chat-input textarea::placeholder {
  color: var(--text-tertiary);
}

.chat-input textarea:focus {
  border-bottom-color: var(--accent);
}

.chat-input-hint {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 6px;
  text-align: right;
}

/* ── Utilities ── */
.hidden { display: none !important; }

/* ── Responsive ── */
@media (max-width: 640px) {
  #sidebar {
    position: absolute;
    z-index: 50;
    height: 100%;
    box-shadow: 1px 0 0 var(--border);
  }
  #sidebar.collapsed {
    box-shadow: none;
  }
}
</style>
</head>
<body>

<!-- ═══════ Login Screen ═══════ -->
<div id="login-screen">
  <div class="login-card">
    <h1>瓶子交流器</h1>
    <p class="subtitle">BottleChat</p>
    <label for="login-user">用户名</label>
    <input type="text" id="login-user" placeholder="输入用户名" value="我自己" autocomplete="off">
    <label for="login-server">服务器地址</label>
    <input type="text" id="login-server" placeholder="wss://example.com" value="wss://chat.bottle.dev" autocomplete="off">
    <button class="btn-connect" id="btn-connect" onclick="handleConnect()">连 接</button>
  </div>
</div>

<!-- ═══════ App Shell ═══════ -->
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="resize-handle"></div>

    <div class="sidebar-header">
      <span class="app-title">瓶子交流器</span>
      <button class="btn-collapse" onclick="toggleSidebar()" title="收起侧栏">&#8249;</button>
    </div>

    <div class="search-box">
      <input type="text" id="search-input" placeholder="搜索对话..." oninput="filterConversations()">
    </div>

    <div class="conv-list" id="conv-list">
      <!-- Populated by JS -->
    </div>

    <div class="user-card">
      <div class="avatar" style="background:#8E8E93" id="user-avatar">我</div>
      <div class="user-info">
        <div class="user-name" id="user-display-name">我自己</div>
        <div class="user-status">在线</div>
      </div>
      <button class="btn-theme" onclick="toggleTheme()" title="切换配色">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </aside>

  <!-- Chat Area -->
  <main id="chat-area">
    <div class="chat-header">
      <button class="btn-expand" onclick="toggleSidebar()" title="展开侧栏">&#8250;</button>
      <div class="header-info">
        <div class="header-name" id="chat-name">公共聊天室</div>
        <div class="header-status" id="chat-status">6 位成员在线</div>
      </div>
      <button class="btn-ellipsis" title="更多选项">&hellip;</button>
    </div>

    <div class="messages" id="messages">
      <!-- Populated by JS -->
    </div>

    <div class="chat-input">
      <textarea id="msg-input" rows="1" placeholder="输入消息..." onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
      <div class="chat-input-hint">按 Enter 发送 &middot; Shift + Enter 换行</div>
    </div>
  </main>

</div>

<script>

  {

      { sender: '陈晓雨', avatar: '陈', color: AVATAR_COLORS[0], text: '那本书我看完了，推荐给你', time: '昨天 10:20', self: false }
    ]
  },
  {
    id: 'zhang',
    name: '张伟',
    avatar: '张',
    color: AVATAR_COLORS[1],
    status: '最后上线 30 分钟前',
    preview: '明天见！',
    time: '昨天',
    messages: [
      { sender: '我', avatar: '我', color: AVATAR_COLORS[7], text: '明天的会议几点开始？', time: '昨天 16:40', self: true },

let activeConvId = 'public';
let sidebarCollapsed = false;
let currentTheme = 'light';

// ── Login ──
function handleConnect() {
  const name = document.getElementById('login-user').value.trim();
  if (name) {
    document.getElementById('user-display-name').textContent = name;
    document.getElementById('user-avatar').textContent = name.charAt(0);
  }
  const screen = document.getElementById('login-screen');
  const app = document.getElementById('app');
  screen.classList.add('fade-out');
  setTimeout(() => {
    screen.classList.add('hidden');
    app.classList.add('visible');
    renderConversations();
    renderMessages(activeConvId);
    document.getElementById('msg-input').focus();
  }, 200);
}

// ── Sidebar Toggle ──
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebarCollapsed = !sidebarCollapsed;
  sidebar.classList.toggle('collapsed', sidebarCollapsed);
}

// ── Theme Toggle ──
function toggleTheme() {
  currentTheme = currentTheme === 'light' ? 'warm' : 'light';
  document.documentElement.setAttribute('data-theme', currentTheme === 'warm' ? 'warm' : '');
}

// ── Resize Handle ──
(function initResize() {
  const handle = document.getElementById('resize-handle');
  const sidebar = document.getElementById('sidebar');
  let startX, startW;

  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    handle.classList.add('active');
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', onUp);
  });

  function onDrag(e) {
    const dx = e.clientX - startX;
    const newW = Math.min(500, Math.max(200, startW + dx));
    sidebar.style.width = newW + 'px';
    document.documentElement.style.setProperty('--sidebar-w', newW + 'px');
  }

  function onUp() {
    handle.classList.remove('active');
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', onUp);
  }
})();

// ── Render Conversations ──
function renderConversations(filter) {
  const list = document.getElementById('conv-list');
  const pinned = [];
  const regular = [];

  conversations.forEach(c => {
    if (filter && !c.name.includes(filter) && !(c.preview && c.preview.includes(filter))) return;
    (c.pinned ? pinned : regular).push(c);
  });

  let html = '';

  if (pinned.length) {
    html += '<div class="conv-divider">置顶</div>';
    pinned.forEach(c => { html += convHTML(c); });
  }

  if (regular.length) {
    html += '<div class="conv-divider">全部对话</div>';
    regular.forEach(c => { html += convHTML(c); });
  }

  list.innerHTML = html;

  // Bind clicks
  list.querySelectorAll('.conv-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      switchConversation(id);
    });
  });
}

function convHTML(c) {
  const isActive = c.id === activeConvId;
  const avatarStyle = `background:${c.color}`;
  const avatarText = c.avatar || c.name.charAt(0);
  return `
    <div class="conv-item${isActive ? ' active' : ''}" data-id="${c.id}">
      <div class="avatar" style="${avatarStyle}">${avatarText}</div>
      <div class="conv-info">
        <div class="conv-name">
          ${c.name}
          ${c.pinned ? '<span class="pin-icon">&#9679;</span>' : ''}
        </div>
        <div class="conv-preview">${c.preview || ''}</div>
      </div>
      <span class="conv-time">${c.time || ''}</span>
    </div>
  `;
}

function filterConversations() {
  const q = document.getElementById('search-input').value.trim();
  renderConversations(q || null);
}

// ── Switch Conversation ──
function switchConversation(id) {
  activeConvId = id;
  renderConversations(document.getElementById('search-input').value.trim() || null);
  renderMessages(id);
  document.getElementById('msg-input').focus();
}

// ── Render Messages ──
function renderMessages(convId) {
  const conv = conversations.find(c => c.id === convId);
  if (!conv) return;

  document.getElementById('chat-name').textContent = conv.name;
  document.getElementById('chat-status').textContent = conv.status || '';

  const container = document.getElementById('messages');
  let html = '';

  html += '<div class="date-divider"><span>今天</span></div>';

  conv.messages.forEach(m => {
    if (m.type === 'system') {
      html += `<div class="msg-system"><span>${m.text}</span></div>`;
    } else {
      const selfClass = m.self ? ' self' : '';
      html += `
        <div class="msg-group">
          <div class="msg-row${selfClass}">
            <div class="msg-avatar" style="background:${m.color}">${m.avatar}</div>
            <div class="msg-bubble">
              <div class="msg-sender">${m.sender}</div>
              <div class="msg-text">${m.text}</div>
              <div class="msg-time">${m.time}</div>
            </div>
          </div>
        </div>
      `;
    }
  });

  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

// ── Send Message ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  const conv = conversations.find(c => c.id === activeConvId);
  if (!conv) return;

  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

  const msg = {
    sender: '我',
    avatar: document.getElementById('user-display-name').textContent.charAt(0),
    color: AVATAR_COLORS[7],
    text: text,
    time: timeStr,
    self: true
  };

  conv.messages.push(msg);
  conv.preview = text;
  conv.time = timeStr;

  // Render the new message with animation
  const container = document.getElementById('messages');
  const group = document.createElement('div');
  group.className = 'msg-group msg-enter';
  group.innerHTML = `
    <div class="msg-row self">
      <div class="msg-avatar" style="background:${msg.color}">${msg.avatar}</div>
      <div class="msg-bubble">
        <div class="msg-sender">${msg.sender}</div>
        <div class="msg-text">${msg.text}</div>
        <div class="msg-time">${msg.time}</div>
      </div>
    </div>
  `;
  container.appendChild(group);
  container.scrollTop = container.scrollHeight;

  input.value = '';
  input.style.height = 'auto';
  renderConversations(document.getElementById('search-input').value.trim() || null);
}

// ── Auto-grow Textarea ──
function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Enter key on login ──
document.getElementById('login-user').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('login-server').focus();
});
document.getElementById('login-server').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleConnect();
});
